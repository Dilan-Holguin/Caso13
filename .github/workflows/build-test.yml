name: Build e Tests

on:
  push:
    branches:
      - test/qa-setup-sonar
  pull_request:
    branches:
      - test/qa-setup-sonar

jobs:
  build:
    name: Build y Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: domesticas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build y Test
        run: mvn clean verify -DskipITs=true
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/domesticas_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Generar reporte de cobertura
        run: mvn jacoco:report
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/domesticas_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Subir artefacto de pruebas
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: target/site/jacoco/
          retention-days: 30

      - name: Comentar estado del build en PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ job.status }}';
            const message = buildStatus === 'success' 
              ? 'Build y tests pasaron correctamente'
              : 'Build o tests fallaron. Revisa los logs.'
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
