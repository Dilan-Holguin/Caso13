name: SonarCloud Analysis with JaCoCo

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sonar-analysis:
    name: Análisis de Calidad con SonarCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: domesticas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fullhistory para mejor análisis

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build y Test con cobertura JaCoCo
        run: mvn clean verify -Dspring.profiles.active=test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Análisis SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            mvn -B sonar:sonar \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token="$SONAR_TOKEN" \
              -Dsonar.organization=fabrica-2026-1-calidad \
              -Dsonar.projectKey=fabrica-2026-1-calidad_Caso13 \
              -Dsonar.qualitygate.wait=true \
              -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
              -Dsonar.pullrequest.branch=${{ github.head_ref }} \
              -Dsonar.pullrequest.base=${{ github.base_ref }}
          else
            mvn -B sonar:sonar \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token="$SONAR_TOKEN" \
              -Dsonar.organization=fabrica-2026-1-calidad \
              -Dsonar.projectKey=fabrica-2026-1-calidad_Caso13 \
              -Dsonar.qualitygate.wait=true \
              -Dsonar.branch.name=${{ github.ref_name }}
          fi

      - name: Upload artefacto de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Comentar resultado en PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ job.status }}';
            const message = buildStatus === 'success' 
              ? 'Tests + cobertura JaCoCo listos. Artifacts subidos.'
              : 'Tests fallaron.'
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
