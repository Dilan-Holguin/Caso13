spring.application.name=domesticas

# ============================================================
# Base de datos — valores por defecto para desarrollo local
# En producción, sobrescribir con variables de entorno
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/domesticas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# Flyway — gestiona las migraciones de esquema
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# JWT
# ============================================================
app.jwt.secret=${APP_JWT_SECRET:cambia-este-secreto-por-uno-fuerte-de-al-menos-256-bits}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.use-hateoas=false
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration

# ============================================================
# Email
# ============================================================
spring.mail.host=${SPRING_MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${SPRING_MAIL_PORT:2525}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Frontend
# ============================================================
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# ============================================================
# CORS
# ============================================================
app.cors.origins=${APP_CORS_ORIGINS:https://project-tdwx8.vercel.app,http://localhost:3000}